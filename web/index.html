<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sands Synergy — Reports</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
<style>
  :root {
    --navy: #0D1B2A;
    --teal: #1A7A6E;
    --gold: #C9A84C;
    --bg: #F6F5F2;
    --border: #DDD8CC;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    overflow-x: hidden;   /* only the table scrolls horizontally, never the page */
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--navy);
  }
  header {
    background: var(--navy);
    color: #fff;
    padding: 18px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    margin: 0;
    color: var(--gold);
  }
  header span { font-size: 13px; opacity: 0.8; }

  .layout {
    display: flex;
    min-height: calc(100vh - 64px);
  }
  nav {
    width: 230px;
    background: #fff;
    border-right: 1px solid var(--border);
    padding: 16px 0;
    position: relative;
    transition: width 0.18s ease;
    flex-shrink: 0;
  }
  nav.collapsed {
    width: 36px;
    padding: 16px 0;
    overflow: hidden;
  }
  nav.collapsed h2,
  nav.collapsed .report-link { display: none; }
  .nav-toggle {
    position: absolute;
    top: 12px;
    right: 8px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    width: 22px;
    height: 22px;
    line-height: 1;
    font-size: 13px;
    color: var(--teal);
    cursor: pointer;
    padding: 0;
  }
  nav.collapsed .nav-toggle { right: 6px; }
  .nav-toggle:hover { background: var(--bg); }
  nav h2 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--teal);
    padding: 0 20px 8px;
    margin: 0;
  }
  .report-link {
    display: block;
    width: 100%;
    text-align: left;
    padding: 10px 20px;
    background: none;
    border: none;
    border-left: 3px solid transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--navy);
    cursor: pointer;
  }
  .report-link:hover { background: var(--bg); }
  .report-link.active {
    border-left-color: var(--gold);
    background: var(--bg);
    font-weight: 700;
  }

  main { flex: 1; padding: 28px; min-width: 0; }
  .panel {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px 24px;
    margin-bottom: 20px;
  }
  .panel h3 {
    font-family: 'Playfair Display', serif;
    color: var(--teal);
    margin: 0 0 14px;
    font-size: 18px;
  }
  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .panel-header h3 { margin: 0; }
  .panel-toggle {
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 10px;
    font-size: 12px;
    color: var(--teal);
    cursor: pointer;
  }
  .panel-toggle:hover { background: var(--bg); }
  #params-body.collapsed { display: none; }
  .params-row {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    align-items: end;
  }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 12px; color: var(--navy); font-weight: 700; }
  .field input, .field select {
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    min-width: 140px;
  }
  button.primary {
    background: var(--teal);
    color: #fff;
    border: none;
    padding: 10px 18px;
    border-radius: 4px;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
  }
  button.primary:hover { opacity: 0.9; }
  button.secondary {
    background: #fff;
    color: var(--teal);
    border: 1px solid var(--teal);
    padding: 9px 16px;
    border-radius: 4px;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
  }
  button.secondary:hover { background: var(--bg); }
  button.ghost {
    background: none;
    color: #888;
    border: 1px solid var(--border);
    padding: 9px 14px;
    border-radius: 4px;
    font-size: 13px;
    cursor: pointer;
  }
  button.ghost:hover { background: var(--bg); }

  /* Toolbar above the table: search box + clear filters */
  .table-toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .search-box {
    flex: 1;
    min-width: 220px;
    max-width: 360px;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
  }
  .search-box:focus { outline: 2px solid var(--teal); outline-offset: -1px; }
  .toolbar-actions { display: flex; gap: 10px; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td {
    text-align: left;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  th {
    background: var(--navy);
    color: #fff;
    position: sticky;
    top: 0;
    cursor: pointer;
    user-select: none;
  }
  th:hover { background: var(--teal); }
  th .sort-arrow { font-size: 10px; margin-left: 4px; opacity: 0.7; }

  /* Per-column filter row, sits right under the sortable header row */
  .filter-row th {
    background: #EFEDE6;
    cursor: default;
    padding: 4px 8px;
    position: sticky;
    top: 33px; /* sits just below the header row when scrolling */
  }
  .filter-row input {
    width: 100%;
    padding: 5px 7px;
    border: 1px solid var(--border);
    border-radius: 3px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    color: var(--navy);
  }

  tr:nth-child(even) { background: #FAFAF8; }
  .table-wrap { max-height: 60vh; overflow: auto; border: 1px solid var(--border); border-radius: 4px; }
  .empty-state { color: #888; font-size: 14px; padding: 20px 0; }
  .row-count { font-size: 12px; color: #777; margin-top: 8px; }
  td.num, th.num { text-align: right; }
  td.num { font-variant-numeric: tabular-nums; }
</style>
</head>
<body>

<header>
  <h1>Sands Synergy — Reports</h1>
  <span id="report-title-tag"></span>
  <span id="user-tag" style="font-size:13px; opacity:0.85;"></span>
</header>

<div class="layout">
  <nav id="report-nav">
    <button class="nav-toggle" id="nav-toggle" title="Hide/show panel">«</button>
    <h2>Reports</h2>
    <div id="report-list"></div>
  </nav>

  <main>
    <div class="panel" id="params-panel" style="display:none;">
      <div class="panel-header">
        <h3 id="params-heading"></h3>
        <button class="panel-toggle" id="params-toggle">Hide</button>
      </div>
      <div id="params-body">
        <div class="params-row" id="params-fields"></div>
        <div style="margin-top:14px;">
          <button class="primary" id="run-btn">Run Report</button>
        </div>
      </div>
    </div>

    <div class="panel" id="results-panel" style="display:none;">
      <div class="table-toolbar">
        <input type="text" class="search-box" id="search-box" placeholder="Search all columns…" />
        <div class="toolbar-actions">
          <button class="ghost" id="clear-filters-btn">Clear filters</button>
          <button class="secondary" id="export-btn">Export to Excel</button>
        </div>
      </div>
      <div class="table-wrap"><table id="results-table"></table></div>
      <div class="row-count" id="row-count"></div>
    </div>

    <div class="panel" id="placeholder-panel">
      <p class="empty-state">Select a report from the left to get started.</p>
    </div>
  </main>
</div>

<script>
  // ---- Configure this for your environment ----
  //const API_BASE = "https://sandsreports-g9d0g8dmd6d2anap.canadacentral-01.azurewebsites.net/api";
const API_BASE = "/api";
  // ----------------------------------------------

  let currentReport = null;
  let allColumns = [];
  let allRows = [];          // full, unfiltered data from the API
  let columnFilters = {};    // { columnName: "typed text" }
  let globalSearch = "";
  let sortColumn = null;
  let sortDirection = 1;     // 1 = ascending, -1 = descending

  // Keywords that signal a money/amount column needing 2dp formatting
  const AMOUNT_KEYWORDS = ['amount', 'amt', 'price', 'rate', 'value', 'cost', 'total', 'charge'];
  let columnMeta = {};   // { colName: { isNumeric, isAmount } }

  function detectColumnMeta(columns, rows) {
    columnMeta = {};
    const sample = rows.slice(0, 50);
    columns.forEach(col => {
      const isAmount = AMOUNT_KEYWORDS.some(k => col.toLowerCase().includes(k));
      const nonNull = sample.map(r => r[col]).filter(v => v !== null && v !== undefined && v !== '');
      const numericCount = nonNull.filter(v => !isNaN(Number(v))).length;
      const isNumeric = nonNull.length > 0 && numericCount / nonNull.length >= 0.8;
      columnMeta[col] = { isNumeric, isAmount };
    });
  }

  async function loadReports() {
    const res = await fetch(`${API_BASE}/reports`);
    const reports = await res.json();
    const list = document.getElementById('report-list');
    list.innerHTML = '';
    reports.forEach(r => {
      const btn = document.createElement('button');
      btn.className = 'report-link';
      btn.textContent = r.display_name;
      btn.onclick = () => selectReport(r, btn);
      list.appendChild(btn);
    });
  }

  function selectReport(report, btnEl) {
    currentReport = report;
    document.querySelectorAll('.report-link').forEach(b => b.classList.remove('active'));
    btnEl.classList.add('active');

    document.getElementById('placeholder-panel').style.display = 'none';
    document.getElementById('results-panel').style.display = 'none';
    document.getElementById('params-panel').style.display = 'block';
    document.getElementById('params-heading').textContent = report.display_name;
    document.getElementById('report-title-tag').textContent = report.description || '';
    document.getElementById('params-body').classList.remove('collapsed');
    document.getElementById('params-toggle').textContent = 'Hide';

    const fieldsWrap = document.getElementById('params-fields');
    fieldsWrap.innerHTML = '';
    (report.parameters || []).forEach(p => {
      const field = document.createElement('div');
      field.className = 'field';
      const label = document.createElement('label');
      label.textContent = p.display_label + (p.is_required ? ' *' : '');
      field.appendChild(label);

      const input = document.createElement('input');
      input.type = p.param_type === 'date' ? 'date' : (p.param_type === 'int' ? 'number' : 'text');
      input.id = `param-${p.param_name}`;
      input.placeholder = p.default_value || '';
      if (p.default_value) input.value = p.default_value;
      field.appendChild(input);
      fieldsWrap.appendChild(field);
    });
  }

  async function runReport() {
    if (!currentReport) return;
    const params = new URLSearchParams();
    (currentReport.parameters || []).forEach(p => {
      const el = document.getElementById(`param-${p.param_name}`);
      if (el && el.value !== '') params.set(p.param_name, el.value);
    });

    const res = await fetch(`${API_BASE}/report/${currentReport.report_id}?${params.toString()}`);
    const data = await res.json();

    if (data.error) {
      alert(`Report error: ${data.error}`);
      return;
    }

    allColumns = data.columns || [];
    allRows = data.rows || [];
    columnFilters = {};
    globalSearch = '';
    sortColumn = null;
    document.getElementById('search-box').value = '';
    detectColumnMeta(allColumns, allRows);

    renderTableShell(allColumns);
    applyFiltersAndRender();
    document.getElementById('results-panel').style.display = 'block';

    // Collapse the params panel after a successful run to free up
    // vertical space for the table - user can click "Show" to reopen
    document.getElementById('params-body').classList.add('collapsed');
    document.getElementById('params-toggle').textContent = 'Show';
  }

  // Builds the header row + the per-column filter row once per report run
  function renderTableShell(columns) {
    const table = document.getElementById('results-table');
    table.innerHTML = '';

    const thead = document.createElement('thead');

    const headRow = document.createElement('tr');
    columns.forEach(col => {
      const th = document.createElement('th');
      if (columnMeta[col]?.isNumeric) th.classList.add('num');
      th.textContent = col;
      const arrow = document.createElement('span');
      arrow.className = 'sort-arrow';
      arrow.id = `sort-arrow-${cssSafe(col)}`;
      th.appendChild(arrow);
      th.onclick = () => toggleSort(col);
      headRow.appendChild(th);
    });
    thead.appendChild(headRow);

    const filterRow = document.createElement('tr');
    filterRow.className = 'filter-row';
    columns.forEach(col => {
      const th = document.createElement('th');
      const input = document.createElement('input');
      input.type = 'text';
      input.placeholder = 'Filter…';
      input.oninput = (e) => {
        columnFilters[col] = e.target.value;
        applyFiltersAndRender();
      };
      th.appendChild(input);
      filterRow.appendChild(th);
    });
    thead.appendChild(filterRow);

    table.appendChild(thead);
    const tbody = document.createElement('tbody');
    tbody.id = 'results-tbody';
    table.appendChild(tbody);
  }

  function cssSafe(s) {
    return s.replace(/[^a-zA-Z0-9]/g, '_');
  }

  function toggleSort(column) {
    if (sortColumn === column) {
      sortDirection *= -1;
    } else {
      sortColumn = column;
      sortDirection = 1;
    }
    applyFiltersAndRender();
  }

  function applyFiltersAndRender() {
    let rows = allRows;

    // Per-column filters: substring match, case-insensitive
    Object.keys(columnFilters).forEach(col => {
      const term = (columnFilters[col] || '').trim().toLowerCase();
      if (term) {
        rows = rows.filter(r => String(r[col] ?? '').toLowerCase().includes(term));
      }
    });

    // Global smart search: matches if ANY column contains the text
    if (globalSearch.trim()) {
      const term = globalSearch.trim().toLowerCase();
      rows = rows.filter(r =>
        allColumns.some(col => String(r[col] ?? '').toLowerCase().includes(term))
      );
    }

    // Sorting
    if (sortColumn) {
      rows = [...rows].sort((a, b) => {
        let va = a[sortColumn], vb = b[sortColumn];
        if (va == null) return 1;
        if (vb == null) return -1;
        const na = Number(va), nb = Number(vb);
        if (!isNaN(na) && !isNaN(nb) && va !== '' && vb !== '') {
          return (na - nb) * sortDirection;
        }
        return String(va).localeCompare(String(vb)) * sortDirection;
      });
    }

    renderRows(allColumns, rows);
    updateSortArrows();
    document.getElementById('row-count').textContent =
      `${rows.length} row${rows.length === 1 ? '' : 's'}` +
      (rows.length !== allRows.length ? ` (of ${allRows.length})` : '');
  }

  function updateSortArrows() {
    allColumns.forEach(col => {
      const el = document.getElementById(`sort-arrow-${cssSafe(col)}`);
      if (!el) return;
      el.textContent = sortColumn === col ? (sortDirection === 1 ? '▲' : '▼') : '';
    });
  }

  function renderRows(columns, rows) {
    const tbody = document.getElementById('results-tbody');
    tbody.innerHTML = '';
    rows.forEach(row => {
      const tr = document.createElement('tr');
      columns.forEach(c => {
        const td = document.createElement('td');
        const meta = columnMeta[c];
        const raw = row[c] ?? '';
        if (meta?.isNumeric && raw !== '') {
          td.classList.add('num');
          const num = Number(raw);
          td.textContent = meta.isAmount ? num.toFixed(2) : num.toLocaleString();
        } else {
          td.textContent = raw;
        }
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
  }

  async function exportToExcel() {
    if (!allRows.length) return;

    // Apply same active filters as the table display
    let rows = allRows;
    Object.keys(columnFilters).forEach(col => {
      const term = (columnFilters[col] || '').trim().toLowerCase();
      if (term) rows = rows.filter(r => String(r[col] ?? '').toLowerCase().includes(term));
    });
    if (globalSearch.trim()) {
      const term = globalSearch.trim().toLowerCase();
      rows = rows.filter(r => allColumns.some(col => String(r[col] ?? '').toLowerCase().includes(term)));
    }

    const wb = new ExcelJS.Workbook();
    const ws = wb.addWorksheet(currentReport.display_name.slice(0, 31));

    // Header row with yellow fill
    ws.addRow(allColumns);
    const headerRow = ws.getRow(1);
    headerRow.eachCell(cell => {
      cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFFFC000' } };
      cell.font = { bold: true, color: { argb: 'FF0D1B2A' } };
      cell.alignment = { vertical: 'middle', horizontal: 'center' };
      cell.border = {
        bottom: { style: 'thin', color: { argb: 'FF0D1B2A' } }
      };
    });
    headerRow.height = 20;

    // Data rows
    rows.forEach(row => {
      const values = allColumns.map(col => {
        const val = row[col];
        if (columnMeta[col]?.isNumeric && val !== null && val !== undefined && val !== '') {
          return Number(val);
        }
        return val ?? '';
      });
      ws.addRow(values);
    });

    // Right-align numeric columns and apply number format for amounts
    allColumns.forEach((col, idx) => {
      const meta = columnMeta[col];
      if (meta?.isNumeric) {
        ws.getColumn(idx + 1).numFmt = meta.isAmount ? '#,##0.00' : '#,##0';
        ws.getColumn(idx + 1).alignment = { horizontal: 'right' };
      }
    });

    // Auto column width based on max content length (header or data)
    ws.columns.forEach((col, idx) => {
      const colName = allColumns[idx] || '';
      const maxDataLen = rows.reduce((max, row) => {
        const val = String(row[colName] ?? '');
        return Math.max(max, val.length);
      }, 0);
      col.width = Math.min(Math.max(colName.length, maxDataLen, 10) + 2, 40);
    });

    // Download
    const buffer = await wb.xlsx.writeBuffer();
    const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${currentReport.report_id}.xlsx`;
    a.click();
    URL.revokeObjectURL(url);
  }

  document.getElementById('run-btn').addEventListener('click', runReport);
  document.getElementById('export-btn').addEventListener('click', () => exportToExcel());
  document.getElementById('search-box').addEventListener('input', (e) => {
    globalSearch = e.target.value;
    applyFiltersAndRender();
  });
  document.getElementById('clear-filters-btn').addEventListener('click', () => {
    columnFilters = {};
    globalSearch = '';
    document.getElementById('search-box').value = '';
    document.querySelectorAll('.filter-row input').forEach(i => i.value = '');
    applyFiltersAndRender();
  });

  document.getElementById('nav-toggle').addEventListener('click', () => {
    const nav = document.getElementById('report-nav');
    const btn = document.getElementById('nav-toggle');
    nav.classList.toggle('collapsed');
    btn.textContent = nav.classList.contains('collapsed') ? '»' : '«';
  });

  document.getElementById('params-toggle').addEventListener('click', () => {
    const body = document.getElementById('params-body');
    const btn = document.getElementById('params-toggle');
    body.classList.toggle('collapsed');
    btn.textContent = body.classList.contains('collapsed') ? 'Show' : 'Hide';
  });

  async function loadCurrentUser() {
    try {
      const res = await fetch('/.auth/me');
      const data = await res.json();
      const principal = data.clientPrincipal;
      const tag = document.getElementById('user-tag');
      if (principal) {
        tag.innerHTML = `${principal.userDetails} &middot; <a href="/.auth/logout" style="color:#fff;">Logout</a>`;
      } else {
        tag.innerHTML = `<a href="/.auth/login/aad" style="color:#fff;">Login</a>`;
      }
    } catch (e) {
      console.error('Could not load auth info', e);
    }
  }

  loadCurrentUser();
  loadReports();
</script>

</body>
</html>
